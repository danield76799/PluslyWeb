<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plusly Web - Matrix Client</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="browser-matrix.min.js"></script>
    <script>
        // Ensure matrixcs is available globally
        if (typeof window.matrixcs === 'undefined' && typeof window.matrix !== 'undefined') {
            window.matrixcs = window.matrix;
        }
        if (typeof window.matrixcs === 'undefined' && typeof window.sdk !== 'undefined') {
            window.matrixcs = window.sdk;
        }
        if (typeof window.matrixcs === 'undefined') {
            console.error('Matrix SDK not loaded!');
        }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1A1A1A;
            color: #fff;
            height: 100vh;
            overflow: hidden;
        }
        .app { display: flex; height: 100vh; }
        .sidebar {
            width: 280px;
            background: #242424;
            border-right: 1px solid #333;
            display: flex;
            flex-direction: column;
        }
        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #333;
        }
        .sidebar-header h1 {
            color: #E60000;
            font-size: 24px;
            margin-bottom: 5px;
        }
        .sidebar-header p {
            color: #888;
            font-size: 12px;
        }
        .room-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }
        .room-item {
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 4px;
            transition: background 0.2s;
        }
        .room-item:hover {
            background: #333;
        }
        .room-item.active {
            background: #E60000;
        }
        .room-name {
            font-weight: 600;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .room-preview {
            color: #888;
            font-size: 12px;
            margin-top: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .chat {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .chat-header {
            padding: 15px 20px;
            background: #242424;
            border-bottom: 1px solid #333;
        }
        .chat-header h2 {
            font-size: 18px;
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        .message {
            margin-bottom: 15px;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message-sender {
            color: #E60000;
            font-weight: 600;
            font-size: 13px;
            margin-bottom: 4px;
        }
        .message-content {
            background: #242424;
            padding: 10px 14px;
            border-radius: 12px;
            display: inline-block;
            max-width: 70%;
            word-wrap: break-word;
        }
        .message-time {
            color: #666;
            font-size: 11px;
            margin-top: 4px;
        }
        .input-area {
            padding: 15px 20px;
            background: #242424;
            border-top: 1px solid #333;
            display: flex;
            gap: 10px;
        }
        .input-area input {
            flex: 1;
            padding: 12px 16px;
            background: #1A1A1A;
            border: 1px solid #333;
            border-radius: 24px;
            color: #fff;
            font-size: 14px;
            outline: none;
        }
        .input-area input:focus {
            border-color: #E60000;
        }
        .input-area button {
            padding: 12px 24px;
            background: #E60000;
            color: #fff;
            border: none;
            border-radius: 24px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }
        .input-area button:hover {
            background: #ff1a1a;
        }
        .login-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: #1A1A1A;
        }
        .login-box {
            background: #242424;
            padding: 40px;
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .login-box h1 {
            color: #E60000;
            margin-bottom: 8px;
            text-align: center;
        }
        .login-box p {
            color: #888;
            text-align: center;
            margin-bottom: 30px;
        }
        .login-box input {
            width: 100%;
            padding: 14px;
            margin-bottom: 12px;
            background: #1A1A1A;
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            outline: none;
        }
        .login-box input:focus {
            border-color: #E60000;
        }
        .login-box button {
            width: 100%;
            padding: 14px;
            background: #E60000;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }
        .login-box button:hover {
            background: #ff1a1a;
        }
        .login-box button:disabled {
            background: #666;
            cursor: not-allowed;
        }
        .error {
            color: #ff4444;
            font-size: 14px;
            margin-top: 10px;
            text-align: center;
        }
        .empty-state {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #666;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const matrixcs = window.matrixcs || window.matrix || window.sdk;

        function App() {
            const [client, setClient] = useState(null);
            const [loggedIn, setLoggedIn] = useState(false);
            const [rooms, setRooms] = useState([]);
            const [currentRoom, setCurrentRoom] = useState(null);
            const [messages, setMessages] = useState([]);
            const [inputMessage, setInputMessage] = useState('');
            const [username, setUsername] = useState('');
            const [password, setPassword] = useState('');
            const [homeserver, setHomeserver] = useState('https://mtux.nl');
            const [error, setError] = useState('');
            const [loading, setLoading] = useState(false);
            const messagesEndRef = useRef(null);

            // Check if Matrix SDK is loaded
            if (!matrixcs) {
                return (
                    <div className="login-screen">
                        <div className="login-box">
                            <h1>Plusly Web</h1>
                            <p style={{color: '#ff4444'}}>Error: Matrix SDK niet geladen. Vernieuw de pagina.</p>
                            <button onClick={() => window.location.reload()}>Vernieuwen</button>
                        </div>
                    </div>
                );
            }

            useEffect(() => {
                if (client) {
                    client.on('sync', (state) => {
                        if (state === 'PREPARED') {
                            setLoggedIn(true);
                            loadRooms();
                        }
                    });

                    client.on('Room.timeline', (event, room) => {
                        if (room.roomId === currentRoom?.roomId) {
                            setMessages(prev => [...prev, event]);
                        }
                    });

                    client.startClient({ initialSyncLimit: 50 });
                }
            }, [client]);

            useEffect(() => {
                messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            }, [messages]);

            const login = async () => {
                setLoading(true);
                setError('');
                try {
                    const tempClient = matrixcs.createClient({ baseUrl: homeserver });
                    const response = await tempClient.loginWithPassword(username, password);
                    
                    const authenticatedClient = matrixcs.createClient({
                        baseUrl: homeserver,
                        accessToken: response.access_token,
                        userId: response.user_id,
                    });
                    
                    setClient(authenticatedClient);
                } catch (err) {
                    setError('Inloggen mislukt: ' + (err.message || 'Onbekende fout'));
                }
                setLoading(false);
            };

            const loadRooms = () => {
                const allRooms = client.getRooms();
                setRooms(allRooms);
                if (allRooms.length > 0 && !currentRoom) {
                    selectRoom(allRooms[0]);
                }
            };

            const selectRoom = (room) => {
                setCurrentRoom(room);
                const timeline = room.getLiveTimeline();
                const events = timeline.getEvents().filter(e => e.getType() === 'm.room.message');
                setMessages(events);
            };

            const sendMessage = async () => {
                if (!inputMessage.trim() || !currentRoom) return;
                try {
                    await client.sendTextMessage(currentRoom.roomId, inputMessage);
                    setInputMessage('');
                } catch (err) {
                    console.error('Send failed:', err);
                }
            };

            const handleKeyPress = (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            };

            const formatTime = (timestamp) => {
                const date = new Date(timestamp);
                return date.toLocaleTimeString('nl-NL', { hour: '2-digit', minute: '2-digit' });
            };

            if (!loggedIn) {
                return (
                    <div className="login-screen">
                        <div className="login-box">
                            <h1>Plusly Web</h1>
                            <p>Matrix chat in je browser</p>
                            <input
                                type="text"
                                placeholder="Homeserver URL"
                                value={homeserver}
                                onChange={(e) => setHomeserver(e.target.value)}
                            />
                            <input
                                type="text"
                                placeholder="Gebruikersnaam"
                                value={username}
                                onChange={(e) => setUsername(e.target.value)}
                            />
                            <input
                                type="password"
                                placeholder="Wachtwoord"
                                value={password}
                                onChange={(e) => setPassword(e.target.value)}
                                onKeyPress={(e) => e.key === 'Enter' && login()}
                            />
                            <button onClick={login} disabled={loading}>
                                {loading ? 'Bezig...' : 'Inloggen'}
                            </button>
                            {error && <div className="error">{error}</div>}
                        </div>
                    </div>
                );
            }

            return (
                <div className="app">
                    <div className="sidebar">
                        <div className="sidebar-header">
                            <h1>Plusly</h1>
                            <p>{client.getUserId()}</p>
                        </div>
                        <div className="room-list">
                            {rooms.map(room => (
                                <div
                                    key={room.roomId}
                                    className={`room-item ${currentRoom?.roomId === room.roomId ? 'active' : ''}`}
                                    onClick={() => selectRoom(room)}
                                >
                                    <div className="room-name">{room.name || 'Onbekend'}</div>
                                    <div className="room-preview">
                                        {room.getLastActiveTimestamp() ? formatTime(room.getLastActiveTimestamp()) : ''}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                    <div className="chat">
                        {currentRoom ? (
                            <>
                                <div className="chat-header">
                                    <h2>{currentRoom.name || 'Chat'}</h2>
                                </div>
                                <div className="messages">
                                    {messages.length === 0 ? (
                                        <div className="empty-state">Nog geen berichten</div>
                                    ) : (
                                        messages.map((event, index) => (
                                            <div key={index} className="message">
                                                <div className="message-sender">
                                                    {event.sender?.name || event.sender?.userId || 'Onbekend'}
                                                </div>
                                                <div className="message-content">
                                                    {event.getContent().body}
                                                </div>
                                                <div className="message-time">
                                                    {formatTime(event.getDate())}
                                                </div>
                                            </div>
                                        ))
                                    )}
                                    <div ref={messagesEndRef} />
                                </div>
                                <div className="input-area">
                                    <input
                                        type="text"
                                        value={inputMessage}
                                        onChange={(e) => setInputMessage(e.target.value)}
                                        onKeyPress={handleKeyPress}
                                        placeholder="Typ een bericht..."
                                    />
                                    <button onClick={sendMessage}>Verstuur</button>
                                </div>
                            </>
                        ) : (
                            <div className="empty-state">Selecteer een chat</div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
